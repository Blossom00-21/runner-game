<!DOCTYPE html>
<html>
<head>
    <title>Tripo Runner</title>
    <style>
        * { margin: 0; padding: 0; overflow: hidden; }
        body { background: #1a1a2e; font-family: 'Segoe UI', Arial; }
        #ui {
            position: fixed; top: 24px; left: 28px;
            color: #fff; font-size: 26px; font-weight: bold;
            text-shadow: 0 2px 12px rgba(0,0,0,0.7); z-index: 100;
            pointer-events: none;
        }
        #ui span { color: #a8edea; }
        #debug {
            position: fixed; top: 20px; right: 20px;
            color: #fff; font-size: 13px; background: rgba(0,0,0,0.55);
            padding: 10px 14px; border-radius: 10px; z-index: 100;
            backdrop-filter: blur(6px);
        }
        #game-over {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
            background: rgba(10,10,30,0.97); color: white; padding: 50px 60px;
            border-radius: 28px; text-align: center; display: none; z-index: 200;
            border: 1px solid rgba(168,237,234,0.3);
            box-shadow: 0 0 60px rgba(168,237,234,0.15);
        }
        #game-over h2 { font-size: 38px; margin-bottom: 10px; }
        #game-over p { font-size: 15px; color: #a8edea; margin-top: 8px; }
        .score-line { font-size: 26px; margin: 18px 0; color: #a8edea; }
        button {
            padding: 14px 36px; font-size: 18px; margin: 10px;
            background: linear-gradient(135deg, #a8edea, #fed6e3);
            color: #1a1a2e; border: none; border-radius: 50px;
            cursor: pointer; font-weight: bold; letter-spacing: 1px;
        }
        button:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <div id="ui">
        <div>🏃 <span id="distance">0</span> m</div>
        <div>🍦 <span id="shakes">0</span> shakes</div>
    </div>

    <div id="debug">
        Status: <span id="status">Loading...</span><br>
        Player: <span id="player-status">Fallback</span><br>
        GLB: <span id="glb-status">Not loaded</span>
    </div>

    <div id="game-over">
        <h2>💥 GAME OVER</h2>
        <div class="score-line">
            <span id="final-distance">0</span>m &nbsp;|&nbsp; <span id="final-shakes">0</span> shakes
        </div>
        <button onclick="restartGame()">🔄 PLAY AGAIN</button>
        <p>Press Space to restart</p>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.154.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { KTX2Loader } from 'three/addons/loaders/KTX2Loader.js';
        import { MeshoptDecoder } from 'https://cdn.jsdelivr.net/npm/meshoptimizer@0.18.1/meshopt_decoder.module.js';

        let scene, camera, renderer, playerGroup, playerModel, obstacleGLB, shakeGLB;
        let obstacles = [], collectibles = [], envObjects = [], clouds = [], particles = [];
        let game = {
            distance: 0, shakes: 0, running: true,
            lane: 1, targetX: 0, jumping: false,
            velocityY: 0, posY: 0, speed: 0.06, frame: 0
        };

        const GRAVITY    = -0.016;
        const JUMP_FORCE = 0.42;
        const MAX_SPEED  = 0.24;
        const lanes      = [-5, 0, 5];
        const keys       = {};

        // ── Fallback player ──────────────────────────────────────────
        function createFallbackPlayer() {
            playerGroup = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.8, 2.8, 1.2), new THREE.MeshLambertMaterial({ color: 0x1976D2 }));
            body.position.y = 1.4; playerGroup.add(body);
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.9), new THREE.MeshLambertMaterial({ color: 0x42A5F5 }));
            head.position.y = 3.0; playerGroup.add(head);
            playerGroup.position.set(0, 0, 25);
            playerGroup.scale.set(1.2, 1.2, 1.2);
            scene.add(playerGroup);
            document.getElementById('player-status').textContent = 'Fallback ✅';
        }

        // ── GLB loaders ──────────────────────────────────────────────
        const ktx2Loader = new KTX2Loader();
        ktx2Loader.setTranscoderPath('https://cdn.jsdelivr.net/npm/three@0.154.0/examples/jsm/libs/basis/');

        function createLoader() {
            ktx2Loader.detectSupport(renderer);
            const loader = new GLTFLoader();
            loader.setKTX2Loader(ktx2Loader);
            loader.setMeshoptDecoder(MeshoptDecoder);
            return loader;
        }

        function loadObstacleGLB() {
            createLoader().load('./obstacle.glb', gltf => {
                obstacleGLB = gltf.scene;
                document.getElementById('glb-status').textContent += ' | obstacle ✅';
            }, undefined, err => {
                console.error('❌ obstacle.glb:', err);
                document.getElementById('glb-status').textContent += ' | obstacle ❌';
            });
        }

        function loadShakeGLB() {
            createLoader().load('./shake.glb', gltf => {
                shakeGLB = gltf.scene;
                document.getElementById('glb-status').textContent += ' | shake ✅';
            }, undefined, err => {
                console.error('❌ shake.glb:', err);
                document.getElementById('glb-status').textContent += ' | shake ❌';
            });
        }

        function loadGLBPlayer() {
            document.getElementById('status').textContent = 'Loading runner.glb...';
            createLoader().load('./runner.glb', gltf => {
                scene.remove(playerGroup);
                playerModel = gltf.scene;
                playerModel.scale.set(3, 3, 3);
                playerModel.position.set(0, 4.5, 25);
                playerModel.rotation.y = Math.PI;
                scene.add(playerModel);
                document.getElementById('player-status').textContent = 'GLB Loaded! 🚀';
                document.getElementById('glb-status').textContent = 'runner.glb ✅';
            }, progress => {
                if (progress.total > 0)
                    document.getElementById('status').textContent = `Loading... ${Math.round(progress.loaded/progress.total*100)}%`;
            }, err => {
                console.error('❌ runner.glb:', err);
                document.getElementById('glb-status').textContent = 'runner ❌';
                document.getElementById('status').textContent = 'Using fallback';
            });
            loadObstacleGLB();
            loadShakeGLB();
        }

        // ── Environment builders ─────────────────────────────────────
        function makeTree(x, z) {
            const g = new THREE.Group();
            const trunk = new THREE.Mesh(
                new THREE.CylinderGeometry(0.3, 0.4, 2.5, 8),
                new THREE.MeshLambertMaterial({ color: 0x8B5E3C })
            );
            trunk.position.y = 1.25; g.add(trunk);
            const foliage = new THREE.Mesh(
                new THREE.ConeGeometry(2.2, 4.5, 8),
                new THREE.MeshLambertMaterial({ color: 0x2E7D32 })
            );
            foliage.position.y = 5.5; g.add(foliage);
            const foliage2 = new THREE.Mesh(
                new THREE.ConeGeometry(1.6, 3.5, 8),
                new THREE.MeshLambertMaterial({ color: 0x388E3C })
            );
            foliage2.position.y = 7.5; g.add(foliage2);
            g.position.set(x, 0, z);
            g.scale.setScalar(0.8 + Math.random() * 0.5);
            scene.add(g);
            envObjects.push(g);
        }

        function makeMountain(x, z, scale) {
            const geo = new THREE.ConeGeometry(18 * scale, 28 * scale, 6);
            const mat = new THREE.MeshLambertMaterial({ color: 0x546E7A });
            const m = new THREE.Mesh(geo, mat);
            m.position.set(x, 0, z);
            scene.add(m);
            // snow cap
            const snow = new THREE.Mesh(
                new THREE.ConeGeometry(5 * scale, 8 * scale, 6),
                new THREE.MeshLambertMaterial({ color: 0xECEFF1 })
            );
            snow.position.set(x, 18 * scale, z);
            scene.add(snow);
        }

        function makeCloud(x, y, z) {
            const g = new THREE.Group();
            const mat = new THREE.MeshLambertMaterial({ color: 0xffffff });
            [[0,0,0,2.2],[2.2,0.5,0,1.6],[-2,0.3,0,1.4],[1,-0.4,0,1.2]].forEach(([cx,cy,cz,r]) => {
                const c = new THREE.Mesh(new THREE.SphereGeometry(r, 8, 6), mat);
                c.position.set(cx, cy, cz); g.add(c);
            });
            g.position.set(x, y, z);
            scene.add(g);
            clouds.push(g);
        }

        function makeFlower(x, z) {
            const stem = new THREE.Mesh(
                new THREE.CylinderGeometry(0.08, 0.08, 0.8, 6),
                new THREE.MeshLambertMaterial({ color: 0x4CAF50 })
            );
            stem.position.set(x, 0.4, z);
            scene.add(stem);
            const colors = [0xFF4081, 0xFFEB3B, 0xFF6D00, 0xE040FB];
            const petal = new THREE.Mesh(
                new THREE.SphereGeometry(0.25, 6, 6),
                new THREE.MeshLambertMaterial({ color: colors[Math.floor(Math.random()*colors.length)] })
            );
            petal.position.set(x, 0.9, z);
            scene.add(petal);
        }

        function spawnParticles() {
            for (let i = 0; i < 80; i++) {
                const p = new THREE.Mesh(
                    new THREE.SphereGeometry(0.08, 4, 4),
                    new THREE.MeshBasicMaterial({ color: new THREE.Color().setHSL(Math.random(), 0.8, 0.7) })
                );
                p.position.set((Math.random()-0.5)*80, Math.random()*20+2, -Math.random()*400);
                p.userData.speed = 0.005 + Math.random()*0.01;
                scene.add(p);
                particles.push(p);
            }
        }

        function buildSideWalls() {
            const wallMat = new THREE.MeshLambertMaterial({ color: 0x9E9E9E });
            const capMat  = new THREE.MeshLambertMaterial({ color: 0xBDBDBD });
            [-9.5, 9.5].forEach(x => {
                const wall = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.4, 1200), wallMat);
                wall.position.set(x, 0.7, -300);
                scene.add(wall);
                for (let z = -580; z < 50; z += 6) {
                    const cap = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.3, 1.2), capMat);
                    cap.position.set(x, 1.55, z);
                    scene.add(cap);
                }
            });
        }

        function buildEnvironment() {
            // Trees both sides
            for (let z = -400; z < 50; z += 18) {
                makeTree(-14 - Math.random()*6, z + Math.random()*6);
                makeTree( 14 + Math.random()*6, z + Math.random()*6);
            }
            // Flowers scattered
            for (let z = -400; z < 50; z += 10) {
                makeFlower(-8 - Math.random()*4, z + Math.random()*5);
                makeFlower( 8 + Math.random()*4, z + Math.random()*5);
            }
            // Mountains in background
            makeMountain(-80, -300, 1.2);
            makeMountain( 80, -280, 1.0);
            makeMountain(-40, -350, 0.8);
            makeMountain( 50, -320, 0.9);
            // Clouds
            for (let i = 0; i < 18; i++) {
                makeCloud((Math.random()-0.5)*120, 18+Math.random()*12, -Math.random()*400);
            }
            // Floating particles
            spawnParticles();
        }

        // ── Init ─────────────────────────────────────────────────────
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 120, 400);

            camera = new THREE.PerspectiveCamera(72, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 9, 36);
            camera.lookAt(0, 3, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Lighting
            scene.add(new THREE.AmbientLight(0xffeedd, 0.7));
            const sun = new THREE.DirectionalLight(0xfff5e0, 1.2);
            sun.position.set(30, 60, 20);
            sun.castShadow = true;
            scene.add(sun);
            const fill = new THREE.HemisphereLight(0x87CEEB, 0x4CAF50, 0.5);
            scene.add(fill);

            // Ground — two tiles for infinite scroll feel
            const groundMat = new THREE.MeshLambertMaterial({ color: 0x5D9E4A });
            for (let i = 0; i < 2; i++) {
                const g = new THREE.Mesh(new THREE.PlaneGeometry(60, 600), groundMat);
                g.rotation.x = -Math.PI/2;
                g.position.set(0, 0, -150 - i*600);
                g.receiveShadow = true;
                scene.add(g);
            }

            // Road / path
            const road = new THREE.Mesh(
                new THREE.PlaneGeometry(16, 1200),
                new THREE.MeshLambertMaterial({ color: 0x8D6E63 })
            );
            road.rotation.x = -Math.PI/2;
            road.position.set(0, 0.01, -300);
            scene.add(road);

            // Lane lines
            lanes.forEach(x => {
                const line = new THREE.Mesh(
                    new THREE.BoxGeometry(0.15, 0.05, 1200),
                    new THREE.MeshBasicMaterial({ color: 0xFFFFFF, opacity: 0.4, transparent: true })
                );
                line.position.set(x, 0.05, -300);
                scene.add(line);
            });

            buildEnvironment();
            buildSideWalls();
            createFallbackPlayer();
            loadGLBPlayer();

            document.getElementById('status').textContent = 'Game Ready! 🎮';
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', e => { keys[e.code] = false; });
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth/window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
            animate();
        }

        // ── Controls ─────────────────────────────────────────────────
        function onKeyDown(e) {
            keys[e.code] = true;

            // Restart on Space when game over
            if (!game.running && e.code === 'Space') {
                restartGame(); return;
            }
            if (!game.running) return;

            if ((e.code === 'ArrowLeft' || e.code === 'KeyA') && game.lane > 0) {
                game.lane--; game.targetX = lanes[game.lane];
            }
            if ((e.code === 'ArrowRight' || e.code === 'KeyD') && game.lane < 2) {
                game.lane++; game.targetX = lanes[game.lane];
            }
            if ((e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') && !game.jumping) {
                game.jumping = true;
                game.velocityY = JUMP_FORCE;
            }
        }

        // ── Animate ──────────────────────────────────────────────────
        function animate() {
            requestAnimationFrame(animate);

            if (!game.running) {
                renderer.render(scene, camera); return;
            }

            game.frame++;
            game.speed = Math.min(MAX_SPEED, 0.06 + game.distance * 0.000035);
            const speed = game.speed;

            const currentPlayer = playerModel || playerGroup;
            if (currentPlayer) {
                const dx = game.targetX - currentPlayer.position.x;
                currentPlayer.position.x += dx * 0.13;
                currentPlayer.rotation.z += (-dx * 0.025 - currentPlayer.rotation.z) * 0.1;

                if (game.jumping) {
                    game.velocityY += GRAVITY;
                    game.posY += game.velocityY;
                    if (game.posY <= 0) {
                        game.posY = 0; game.velocityY = 0; game.jumping = false;
                    }
                }
                currentPlayer.position.y = game.posY;
            }

            // Camera gentle bob
            camera.position.y = 9 + Math.sin(game.frame * 0.06) * 0.06;

            // Scroll env objects slowly (parallax)
            envObjects.forEach(obj => {
                obj.position.z += speed * 4;
                if (obj.position.z > 60) obj.position.z -= 460;
            });

            // Drift clouds slowly
            clouds.forEach(c => {
                c.position.z += speed * 4;
                c.position.x += 0.008;
                if (c.position.z > 80) c.position.z -= 480;
            });

            // Float particles
            particles.forEach(p => {
                p.position.y += Math.sin(game.frame * p.userData.speed * 10) * 0.01;
                p.position.z += speed * 18;
                if (p.position.z > 60) p.position.z -= 460;
            });

            // Spawn
            const spawnRate  = Math.max(55, Math.floor(120 - game.distance * 0.04));
            const collectRate = Math.max(90, Math.floor(160 - game.distance * 0.03));
            if (game.frame % spawnRate === 0) spawnObstacle();
            if (game.frame % collectRate === 0) spawnCollectible();

            updateObjects(obstacles, speed, true);
            updateObjects(collectibles, speed, false);

            game.distance += speed * 8;
            updateUI();
            renderer.render(scene, camera);
        }

        // ── Spawn ────────────────────────────────────────────────────
        function spawnObstacle() {
            const pivot = new THREE.Group();
            if (obstacleGLB) {
                const obs = obstacleGLB.clone();
                obs.scale.set(3, 3, 3);
                obs.rotation.y = Math.PI / 2;
                pivot.add(obs);
            } else {
                const obs = new THREE.Mesh(new THREE.BoxGeometry(3, 4, 3), new THREE.MeshLambertMaterial({ color: 0xcc0000 }));
                obs.position.y = 2;
                pivot.add(obs);
            }
            pivot.position.set(lanes[Math.floor(Math.random()*3)], 2, -120);
            scene.add(pivot); obstacles.push(pivot);
        }

        function spawnCollectible() {
            let item;
            if (shakeGLB) {
                item = shakeGLB.clone();
                item.scale.set(3, 3, 3);
            } else {
                item = new THREE.Mesh(new THREE.ConeGeometry(1, 2.5, 12), new THREE.MeshLambertMaterial({ color: 0x00ff88 }));
            }
            item.position.set(lanes[Math.floor(Math.random()*3)], 2.5, -120);
            scene.add(item); collectibles.push(item);
        }

        // ── Update objects ───────────────────────────────────────────
        function updateObjects(array, speed, isObstacle) {
            for (let i = array.length - 1; i >= 0; i--) {
                const obj = array[i];
                obj.position.z += speed * 18;
                if (!isObstacle) {
                    obj.rotation.y += 0.04;
                    obj.position.y = 2.5 + Math.sin(game.frame * 0.08) * 0.3;
                }
                if (obj.position.z > 50) {
                    scene.remove(obj); array.splice(i, 1);
                } else {
                    const cp = playerModel || playerGroup;
                    if (cp && checkCollision(cp, obj)) {
                        if (isObstacle) { gameOver(); return; }
                        else { scene.remove(obj); array.splice(i, 1); game.shakes++; }
                    }
                }
            }
        }

        function checkCollision(player, obj) {
            const b1 = new THREE.Box3().setFromObject(player);
            const b2 = new THREE.Box3().setFromObject(obj);
            // Shrink hitbox so jump clearance feels fair
            b1.min.y += 1.5; b1.max.x -= 0.5; b1.min.x += 0.5;
            return b1.intersectsBox(b2);
        }

        function updateUI() {
            document.getElementById('distance').textContent = Math.floor(game.distance);
            document.getElementById('shakes').textContent = game.shakes;
        }

        function gameOver() {
            game.running = false;
            document.getElementById('final-distance').textContent = Math.floor(game.distance);
            document.getElementById('final-shakes').textContent = game.shakes;
            document.getElementById('game-over').style.display = 'block';
        }

        window.restartGame = function() {
            game = { distance: 0, shakes: 0, running: true, lane: 1, targetX: 0, jumping: false, velocityY: 0, posY: 0, speed: 0.06, frame: 0 };
            obstacles.forEach(o => scene.remove(o));
            collectibles.forEach(c => scene.remove(c));
            obstacles = []; collectibles = [];
            const cp = playerModel || playerGroup;
            if (cp) { cp.position.set(0, playerModel ? 1.0 : 0, 25); cp.rotation.z = 0; }
            document.getElementById('game-over').style.display = 'none';
        };

        init();
    </script>
</body>
</html>
