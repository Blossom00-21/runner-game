<!DOCTYPE html>
<html>
<head>
    <title>Runner Game</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial; background: #000; }
        #ui { 
            position: absolute; top: 10px; left: 10px; 
            color: white; font-size: 24px; font-weight: bold; z-index: 100; 
        }
        #game-over { 
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            background: rgba(0,0,0,0.9); color: white; padding: 30px; 
            text-align: center; border-radius: 15px; display: none; 
        }
        button { 
            background: #00ff88; color: black; padding: 12px 24px; 
            font-size: 18px; border: none; border-radius: 8px; cursor: pointer; 
        }
        #instructions { 
            position: absolute; bottom: 10px; left: 10px; color: #fff; font-size: 14px; 
        }
        #loading {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white; font-size: 24px; z-index: 200;
        }
    </style>
</head>
<body>
    <div id="loading">Loading...</div>
    <div id="ui">
        Distance: <span id="distance">0</span> | 
        Shakes: <span id="shakes">0</span> | 
        <span id="speed" style="color:#00ff00;">Walk</span>
    </div>
    
    <div id="game-over">
        <h2 style="color:#ff4444;">GAME OVER!</h2>
        <p>Distance: <span id="final-distance">0</span></p>
        <p>Shakes: <span id="final-shakes">0</span></p>
        <button onclick="restart()">RESTART</button>
    </div>
    
    <div id="instructions">← → Change Lane | SHIFT Run Faster!</div>

    <!-- ✅ CORRECT CDN LINKS FOR THREE.JS r160+ -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // GAME STATE
        let scene, camera, renderer, player;
        let obstacles = [], shakes = [], ground;
        let distance = 0, shakesCollected = 0, gameRunning = true;
        let frame = 0, currentLane = 1, targetX = 0;
        let playerModel, isLoaded = false;
        const lanes = [-4, 0, 4];
        const keys = {};
        let mixer;

        // SPEEDS
        const walkSpeed = 0.06;
        const runSpeed = 0.11;

        function init() {
            console.log("🚀 Runner Game - Starting!");
            
            // SCENE
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 25, 150);
            
            // CAMERA
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(-1.5, 3.5, 20);
            camera.rotation.set(-0.35, 0.25, 0);
            
            // RENDERER
            renderer = new THREE.WebGLRenderer({antialias:true});
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);
            
            // LIGHTS
            scene.add(new THREE.AmbientLight(0xffffff, 0.85));
            const sun = new THREE.DirectionalLight(0xffffff, 0.6);
            sun.position.set(15, 25, 10);
            sun.castShadow = true;
            sun.shadow.mapSize.width = 2048;
            sun.shadow.mapSize.height = 2048;
            scene.add(sun);
            
            // GROUND
            const groundGeometry = new THREE.PlaneGeometry(28, 500);
            const groundMaterial = new THREE.MeshLambertMaterial({color: 0x555555});
            ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI/2;
            ground.receiveShadow = true;
            scene.add(ground);
            
            // YELLOW LANE LINES
            for(let i = 0; i < 3; i++) {
                const lineGeometry = new THREE.BoxGeometry(0.4, 0.4, 500);
                const lineMaterial = new THREE.MeshBasicMaterial({color: 0xFFFF44});
                const line = new THREE.Mesh(lineGeometry, lineMaterial);
                line.position.set(lanes[i], 0.2, 0);
                scene.add(line);
            }
            
            // BACKGROUND BUILDINGS
            for(let i = 0; i < 30; i++) {
                const height = 12 + Math.random() * 15;
                const buildingGeometry = new THREE.BoxGeometry(8, height, 18);
                const buildingMaterial = new THREE.MeshLambertMaterial({ 
                    color: new THREE.Color().setHSL(0.6 + Math.random()*0.1, 0.6, 0.5) 
                });
                const building = new THREE.Mesh(buildingGeometry, buildingMaterial);
                building.position.set(
                    Math.random() > 0.5 ? 18 : -18,
                    height/2,
                    -60 - i * 28
                );
                building.castShadow = true;
                scene.add(building);
            }
            
            // CREATE FALLBACK PLAYER FIRST (GAME STARTS IMMEDIATELY)
            createFallbackPlayer();
            
            // TRY TO LOAD MODELS (OPTIONAL)
            loadModels();
            
            // Controls
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            window.addEventListener('resize', onResize);
            
            document.getElementById('loading').style.display = 'none';
            console.log("✅ Game ready - Fallback player active!");
            animate();
        }

        function createFallbackPlayer() {
            player = new THREE.Group();
            
            // Body
            const bodyGeometry = new THREE.BoxGeometry(1.4, 2.2, 0.8);
            const bodyMaterial = new THREE.MeshLambertMaterial({color: 0x0066FF});
            const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
            body.position.y = 1.2;
            body.castShadow = true;
            player.add(body);
            
            // Head
            const headGeometry = new THREE.SphereGeometry(0.7, 16, 16);
            const headMaterial = new THREE.MeshLambertMaterial({color: 0xFFDDAA});
            const head = new THREE.Mesh(headGeometry, headMaterial);
            head.position.y = 2.8;
            head.castShadow = true;
            player.add(head);
            
            // Arms (indices 2,3)
            const armGeometry = new THREE.BoxGeometry(0.35, 1.4, 0.35);
            const armMaterial = new THREE.MeshLambertMaterial({color: 0x0066FF});
            const leftArm = new THREE.Mesh(armGeometry, armMaterial);
            leftArm.position.set(-1, 1.5, 0);
            leftArm.castShadow = true;
            player.add(leftArm);
            
            const rightArm = new THREE.Mesh(armGeometry, armMaterial);
            rightArm.position.set(1, 1.5, 0);
            rightArm.castShadow = true;
            player.add(rightArm);
            
            // Legs (indices 4,5)
            const legGeometry = new THREE.BoxGeometry(0.45, 1.6, 0.45);
            const legMaterial = new THREE.MeshLambertMaterial({color: 0x333333});
            const leftLeg = new THREE.Mesh(legGeometry, legMaterial);
            leftLeg.position.set(-0.4, 0, 0);
            leftLeg.castShadow = true;
            player.add(leftLeg);
            
            const rightLeg = new THREE.Mesh(legGeometry, legMaterial);
            rightLeg.position.set(0.4, 0, 0);
            rightLeg.castShadow = true;
            player.add(rightLeg);
            
            player.position.set(0, 0, 18);
            scene.add(player);
            isLoaded = true;
        }

        function loadModels() {
            const loader = new GLTFLoader();
            
            // Load runner model (replaces fallback)
            loader.load('runner.glb', (gltf) => {
                // Remove fallback player
                scene.remove(player);
                
                playerModel = gltf.scene;
                playerModel.scale.set(1.5, 1.5, 1.5);
                playerModel.position.set(0, 0, 18);
                scene.add(playerModel);
                player = playerModel;
                
                if (gltf.animations && gltf.animations.length > 0) {
                    mixer = new THREE.AnimationMixer(playerModel);
                    const action = mixer.clipAction(gltf.animations[0]);
                    action.play();
                }
                
                console.log("✅ Runner model loaded successfully!");
            }, undefined, (error) => {
                console.log("ℹ️ runner.glb not found - using fallback player");
            });

            // Load obstacle model
            loader.load('obstacle.glb', (gltf) => {
                console.log("✅ Obstacle model loaded!");
            }, undefined, () => {
                console.log("ℹ️ obstacle.glb not found - using fallback");
            });

            // Load shake model  
            loader.load('shake.glb', (gltf) => {
                console.log("✅ Shake model loaded!");
            }, undefined, () => {
                console.log("ℹ️ shake.glb not found - using fallback");
            });
        }

        function onKeyDown(e) {
            keys[e.code] = true;
            if(e.code === 'ArrowLeft' && currentLane > 0) {
                currentLane--;
                targetX = lanes[currentLane];
            }
            if(e.code === 'ArrowRight' && currentLane < 2) {
                currentLane++;
                targetX = lanes[currentLane];
            }
        }

        function onKeyUp(e) {
            keys[e.code] = false;
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function spawnObstacle() {
            // Fallback obstacle (model loading is async)
            const obstacle = new THREE.Mesh(
                new THREE.BoxGeometry(2, 3.5, 2),
                new THREE.MeshLambertMaterial({color: 0xFF4444})
            );
            const laneIndex = Math.floor(Math.random() * 3);
            obstacle.position.set(lanes[laneIndex], 1.75, -70);
            obstacle.castShadow = true;
            scene.add(obstacle);
            obstacles.push(obstacle);
        }

        function spawnShake() {
            // Fallback shake
            const shake = new THREE.Mesh(
                new THREE.CylinderGeometry(0.6, 0.6, 2.5, 12),
                new THREE.MeshLambertMaterial({color: 0x00FF88})
            );
            const laneIndex = Math.floor(Math.random() * 3);
            shake.position.set(lanes[laneIndex], 1.25, -70);
            shake.castShadow = true;
            scene.add(shake);
            shakes.push(shake);
        }

        function checkCollision(player, obj) {
            const playerBox = new THREE.Box3().setFromObject(player);
            const objBox = new THREE.Box3().setFromObject(obj);
            return playerBox.intersectsBox(objBox);
        }

        function update() {
            if(!gameRunning || !isLoaded) return;
            
            frame++;
            const speed = (keys['ShiftLeft'] || keys['ShiftRight']) ? runSpeed : walkSpeed;
            
            // Update mixer
            if (mixer) {
                mixer.update(0.016);
            }
            
            // Smooth lane movement
            player.position.x += (targetX - player.position.x) * 0.12;
            player.position.z = 18;
            
            // FALLBACK ANIMATION
            if (player.children && player.children.length === 6) {
                const legs = [player.children[4], player.children[5]];
                const arms = [player.children[2], player.children[3]];
                const time = frame * (speed === runSpeed ? 0.3 : 0.15);
                
                legs[0].rotation.z = Math.sin(time) * 0.4;
                legs[1].rotation.z = Math.sin(time + Math.PI) * 0.4;
                arms[0].rotation.z = Math.sin(time + Math.PI) * 0.25;
                arms[1].rotation.z = Math.sin(time) * 0.25;
            }
            
            // Spawn objects
            if(frame % 220 === 0) spawnObstacle();
            if(frame % 320 === 0) spawnShake();
            
            // Move obstacles
            for(let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                obs.position.z += speed * 14;
                obs.rotation.y += 0.025;
                
                if(obs.position.z > 35) {
                    scene.remove(obs);
                    obstacles.splice(i, 1);
                    distance += 12;
                } else if(checkCollision(player, obs)) {
                    gameOver();
                    return;
                }
            }
            
            // Move shakes
            for(let i = shakes.length - 1; i >= 0; i--) {
                const shake = shakes[i];
                shake.position.z += speed * 14;
                shake.rotation.y += 0.12;
                
                if(shake.position.z > 35) {
                    scene.remove(shake);
                    shakes.splice(i, 1);
                } else if(checkCollision(player, shake)) {
                    scene.remove(shake);
                    shakes.splice(i, 1);
                    shakesCollected += 1;
                }
            }
            
            // Ground scroll
            ground.position.z += speed * 14;
            if(ground.position.z > 250) ground.position.z -= 500;
            
            // Update UI
            document.getElementById('distance').textContent = Math.floor(distance);
            document.getElementById('shakes').textContent = shakesCollected;
            document.getElementById('speed').innerHTML = 
                (keys['ShiftLeft'] || keys['ShiftRight']) ? '<span style="color:#FFAA00;">RUN!</span>' : 'Walk';
        }

        let clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            update();
            renderer.render(scene, camera);
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('final-distance').textContent = Math.floor(distance);
            document.getElementById('final-shakes').textContent = shakesCollected;
            document.getElementById('game-over').style.display = 'block';
        }

        function restart() {
            location.reload();
        }

        // START GAME IMMEDIATELY
        init();
    </script>
</body>
</html>
